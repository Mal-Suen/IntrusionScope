# IntrusionScope Configuration File
# Default configuration for IntrusionScope

[general]
temp_dir = ""
max_workers = 4
timeout = 3600
offline_mode = false

[collector]
default_preset = "standard"
max_file_size = 104857600
hash_algorithms = ["md5", "sha1", "sha256"]

[detector]
min_severity = "medium"
enable_yara = true
enable_sigma = true
enable_ioc = true
max_memory_mb = 256

[sync]
enabled = true
update_interval = 24
sources = ["malwarebazaar", "urlhaus", "threatfox", "dshield", "spamhaus", "sigmahq", "yarahq"]
cache_dir = ""

[output]
default_format = "json"
output_dir = "./output"
compress = false

[logging]
level = "info"
format = "json"
file_path = ""
max_size = 100
